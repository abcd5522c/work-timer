name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools-version: 33.0.0

    - name: Install dependencies
      run: npm install

    - name: Build web app
      run: npm run build

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova project
      run: |
        cordova create cordova-app com.workshift.app WorkShift
        cd cordova-app
        cordova platform add android@13

    - name: Copy built app to Cordova
      run: |
        mkdir -p cordova-app/www
        cp -r dist/* cordova-app/www/ || true
        cp cordova-app/www/index.html cordova-app/www/index.html || true

    - name: Build APK
      run: |
        cd cordova-app
        cordova build android --release

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: workshift-apk
        path: cordova-app/platforms/android/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
